<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#060610"/>
  <!-- Bracket left -->
  <text x="4" y="44" font-family="monospace" font-size="26" font-weight="700" fill="url(#bg)">&lt;</text>
  <!-- DJ letters -->
  <text x="18" y="44" font-family="monospace" font-size="22" font-weight="700" fill="#f0f4ff">DJ</text>
  <!-- Bracket right / -->
  <text x="47" y="44" font-family="monospace" font-size="26" font-weight="700" fill="url(#bg)">/&gt;</text>
</svg>
